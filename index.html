<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Seed Gen</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 15px;
}

label {
    font-size: 14px;
}

input, select, button {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
}

select, input {
    background: #334155;
    color: white;
}

button {
    background: #38bdf8;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background:#0ea5e9;
}

.seed-box {
    margin-top: 15px;
    padding: 12px;
    background: black;
    border-radius: 10px;
    word-break: break-all;
    font-size: 14px;
}

.status {
    margin-top: 6px;
    font-size: 12px;
    color: #94a3b8;
}

.hidden {
    display: none;
}

/* モバイル最適化 */
@media (max-width: 480px) {
    h1 { font-size: 18px; }
    input, select, button {
        font-size: 13px;
        padding: 9px;
    }
}
</style>
</head>

<body>
<div class="container">
    <h1>Seed Gen</h1>

    <label>エディション</label>
    <select id="edition">
        <option value="java">Java版</option>
        <option value="bedrock">統合版</option>
    </select>

    <label>
        <input type="checkbox" id="villageCheck"> 村付近にスポーン
    </label>

    <div id="villageBox" class="hidden">
        <label>村バイオーム</label>
        <select id="villageBiome">
            <option value="">指定なし</option>
            <option value="plains">平原</option>
            <option value="desert">砂漠</option>
            <option value="savanna">サバンナ</option>
            <option value="taiga">タイガ</option>
            <option value="snowy">雪原</option>
        </select>
    </div>

    <label>
        <input type="checkbox" id="biomeCheck"> スポーンバイオーム指定
    </label>

    <div id="biomeBox" class="hidden">
        <label>バイオーム</label>
        <select id="biome">
            <option value="plains">平原</option>
            <option value="forest">森</option>
            <option value="savanna">サバンナ</option>
            <option value="taiga">タイガ</option>
            <option value="snowy">雪原</option>
        </select>
    </div>

    <button id="generateBtn">探索開始</button>

    <div class="seed-box" id="seed">---</div>
    <div class="status" id="status">待機中</div>

    <button id="copyBtn">コピー</button>
</div>

<script src="script.js"></script>
</body>
</html>
