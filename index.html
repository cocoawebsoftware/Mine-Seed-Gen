<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Seed Gen</title>

<style>
body {
    font-family: sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px;
}
.container {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    max-width: 420px;
    width: 100%;
}
input, select, button {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    border: none;
}
button { background: #38bdf8; }
.hidden { display:none; }
.seed-box { background:black; padding:10px; margin-top:10px; }
</style>
</head>

<body>
<div class="container">
    <h1>Seed Gen</h1>

    <select id="edition">
        <option value="java">Java</option>
        <option value="bedrock">Bedrock</option>
    </select>

    <label><input type="checkbox" id="villageCheck"> 村</label>
    <div id="villageBox" class="hidden">
        <select id="villageBiome">
            <option value="">指定なし</option>
            <option value="plains">平原</option>
            <option value="desert">砂漠</option>
        </select>
    </div>

    <button id="generateBtn">探索</button>

    <div id="seed" class="seed-box">---</div>
    <div id="status">待機中</div>
</div>

<script src="script.js"></script>
</body>
</html>
